<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArnarFlow Update</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* Subtle animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(0, 210, 106, 0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 50%, rgba(0, 150, 255, 0.04) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes bgPulse {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-2%, -1%) scale(1.05); }
    }

    .logo-container {
      margin-bottom: 32px;
      position: relative;
    }

    .logo {
      width: 64px;
      height: 64px;
      position: relative;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(0, 210, 106, 0.3));
    }

    /* Pulse ring around logo */
    .logo::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      border: 1px solid rgba(0, 210, 106, 0.15);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0; }
    }

    .app-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-text {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
      min-height: 18px;
      transition: all 0.3s ease;
    }

    .status-text.active {
      color: #aaa;
    }

    /* Progress bar */
    .progress-container {
      width: 280px;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00d26a, #00e676);
      border-radius: 4px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      box-shadow: 0 0 12px rgba(0, 210, 106, 0.4);
    }

    /* Indeterminate animation */
    .progress-bar.indeterminate {
      width: 30% !important;
      animation: indeterminate 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(430%); }
    }

    .progress-percent {
      font-size: 12px;
      color: #00d26a;
      margin-top: 10px;
      font-variant-numeric: tabular-nums;
      min-height: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .progress-percent.visible {
      opacity: 1;
    }

    .version-tag {
      position: fixed;
      bottom: 16px;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.3px;
    }

    /* Close button */
    .close-btn {
      position: fixed;
      top: 10px;
      right: 14px;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #555;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #aaa;
    }

    /* Ready state */
    .ready .status-text {
      color: #00d26a;
    }

    .ready .progress-bar {
      width: 100% !important;
      animation: none;
    }

    /* Action buttons */
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 10px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.4s ease;
      pointer-events: none;
    }

    .actions.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d26a, #00b85c);
      color: #fff;
      box-shadow: 0 2px 12px rgba(0, 210, 106, 0.25);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #00e676, #00d26a);
      box-shadow: 0 4px 16px rgba(0, 210, 106, 0.35);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00e676"/>
            <stop offset="100%" style="stop-color:#00d26a"/>
          </linearGradient>
        </defs>
        <rect x="10" y="10" width="80" height="80" rx="18" fill="#1a1a2e" stroke="url(#logoGrad)" stroke-width="2.5"/>
        <path d="M35 65 L35 35 L50 50 L65 35 L65 65" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>

  <div class="app-name">ArnarFlow</div>
  <div class="status-text" id="status">Checking for updates...</div>

  <div class="progress-container">
    <div class="progress-bar indeterminate" id="progressBar"></div>
  </div>
  <div class="progress-percent" id="progressPercent"></div>

  <div class="actions" id="actions">
    <button class="btn btn-primary" id="btnRestart" onclick="restartNow()">Restart Now</button>
    <button class="btn btn-secondary" id="btnLater" onclick="later()">Later</button>
  </div>

  <div class="version-tag" id="version"></div>

  <script>
    const { ipcRenderer } = require('electron');

    const statusEl = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const actionsEl = document.getElementById('actions');
    const versionEl = document.getElementById('version');

    // Listen for update status from main process
    ipcRenderer.on('update-splash-status', (event, data) => {
      const { status, percent, version, message } = data;

      switch (status) {
        case 'checking':
          statusEl.textContent = 'Checking for updates...';
          statusEl.className = 'status-text active';
          progressBar.className = 'progress-bar indeterminate';
          break;

        case 'available':
          statusEl.textContent = `Downloading v${version}...`;
          statusEl.className = 'status-text active';
          progressBar.className = 'progress-bar';
          progressBar.style.width = '0%';
          break;

        case 'downloading':
          statusEl.textContent = 'Downloading update...';
          statusEl.className = 'status-text active';
          progressBar.className = 'progress-bar';
          progressBar.style.width = percent + '%';
          progressPercent.textContent = percent + '%';
          progressPercent.className = 'progress-percent visible';
          break;

        case 'ready':
          document.body.classList.add('ready');
          statusEl.textContent = `v${version} ready to install`;
          statusEl.className = 'status-text';
          progressBar.className = 'progress-bar';
          progressBar.style.width = '100%';
          progressPercent.textContent = '100%';
          actionsEl.className = 'actions visible';
          break;

        case 'up-to-date':
          statusEl.textContent = 'You\'re up to date!';
          statusEl.className = 'status-text';
          progressBar.className = 'progress-bar';
          progressBar.style.width = '100%';
          // Auto-close after 2s
          setTimeout(() => ipcRenderer.send('update-splash-close'), 2000);
          break;

        case 'error':
          statusEl.textContent = 'Update failed — will retry later';
          statusEl.className = 'status-text';
          progressBar.className = 'progress-bar';
          progressBar.style.width = '0%';
          setTimeout(() => ipcRenderer.send('update-splash-close'), 3000);
          break;
      }
    });

    function restartNow() {
      ipcRenderer.send('update-splash-restart');
    }

    function later() {
      ipcRenderer.send('update-splash-close');
    }

    // Get current version
    ipcRenderer.invoke('get-app-version').then(v => {
      versionEl.textContent = 'v' + v;
    }).catch(() => {});
  </script>
</body>
</html>
